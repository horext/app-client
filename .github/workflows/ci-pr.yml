name: CI Pull Request

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  pull_request:
    branches: [main, next, develop]

# Set minimal permissions for the workflow
permissions:
  contents: read

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  baseline:
    name: Baseline Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: package.json

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Benchmark
        run: mkdir -p .bench && pnpm bench

      - name: Upload baseline
        uses: actions/upload-artifact@v7
        with:
          name: bench-baseline
          path: .bench/results.json
          overwrite: true

  ci:
    name: CI
    needs: baseline
    uses: ./.github/workflows/ci.yml
    with:
      with-baseline: true

  summary:
    name: Benchmark Summary
    needs: ci
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download benchmark results
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: bench-results
          path: .bench

      - name: Write job summary
        run: |
          echo "## ⚡ Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ -s .bench/output.txt ]]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat .bench/output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Benchmark output not available." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Post benchmark comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          if [[ -s .bench/output.txt ]]; then
            BENCH_BODY="$(cat .bench/output.txt)"
          else
            BENCH_BODY="main branch has no benchmark setup yet — results will appear after this PR is merged."
          fi

          BODY="<!-- bench-results -->
          ## ⚡ Benchmark Results

          \`\`\`
          $BENCH_BODY
          \`\`\`"

          COMMENT_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | startswith("<!-- bench-results -->")) | .id' | head -1)
          if [[ -n "$COMMENT_ID" ]]; then
            gh api "repos/$REPO/issues/comments/$COMMENT_ID" -X PATCH -F body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
          fi
