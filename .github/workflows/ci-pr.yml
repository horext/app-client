name: CI Pull Request

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  pull_request:
    branches: [main, next, develop]

# Set minimal permissions for the workflow
permissions:
  contents: read

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  baseline:
    name: Baseline Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: package.json

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Benchmark
        run: mkdir -p .bench && pnpm bench

      - name: Upload baseline
        uses: actions/upload-artifact@v7
        with:
          name: bench-baseline
          path: .bench/results.json
          overwrite: true

  ci:
    name: CI
    needs: baseline
    uses: ./.github/workflows/ci.yml
    with:
      with-baseline: true

  summary:
    name: Benchmark Summary
    needs: ci
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download benchmark results
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: bench-results
          path: .bench

      - name: Generate benchmark report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            if (!fs.existsSync('.bench/results.json')) {
              await core.summary.addHeading('⚡ Benchmark Results').addRaw('Benchmark output not available.').write();
              return;
            }

            const results = JSON.parse(fs.readFileSync('.bench/results.json', 'utf8'));
            let baseline = null;
            try { baseline = JSON.parse(fs.readFileSync('.bench/baseline.json', 'utf8')); } catch {}

            const baselineMap = {};
            if (baseline) {
              for (const file of baseline.files)
                for (const group of file.groups)
                  for (const bench of group.benchmarks)
                    baselineMap[`${group.fullName}::${bench.name}`] = bench;
            }

            const hasBaseline = Object.keys(baselineMap).length > 0;
            const headers = ['Scenario', 'Benchmark', 'ops/sec', 'mean (ms)', 'p99 (ms)', '±rme'];
            if (hasBaseline) headers.push('vs baseline');

            const rows = [];
            for (const file of results.files) {
              for (const group of file.groups) {
                const m = group.fullName.match(/> (.+)$/);
                const scenario = m ? m[1] : group.fullName;
                for (const bench of group.benchmarks) {
                  const row = [
                    scenario,
                    bench.name,
                    Math.round(bench.hz).toLocaleString('en-US'),
                    bench.mean.toFixed(3),
                    bench.p99.toFixed(3),
                    `±${bench.rme.toFixed(2)}%`,
                  ];
                  if (hasBaseline) {
                    const base = baselineMap[`${group.fullName}::${bench.name}`];
                    if (base) {
                      const delta = ((bench.mean - base.mean) / base.mean) * 100;
                      const emoji = delta < -2 ? '🟢' : delta > 2 ? '🔴' : '🟡';
                      row.push(`${emoji} ${delta > 0 ? '+' : ''}${delta.toFixed(1)}%`);
                    } else {
                      row.push('—');
                    }
                  }
                  rows.push(row);
                }
              }
            }

            await core.summary
              .addHeading('⚡ Benchmark Results')
              .addTable([
                headers.map(h => ({ data: h, header: true })),
                ...rows.map(r => r.map(d => ({ data: String(d) }))),
              ])
              .write();

            const align = headers.map((_, i) => i >= 2 ? '---:' : ':---');
            let md = `| ${headers.join(' | ')} |\n| ${align.join(' | ')} |\n`;
            for (const row of rows) md += `| ${row.join(' | ')} |\n`;
            fs.writeFileSync('.bench/comment.md', `<!-- bench-results -->\n## ⚡ Benchmark Results\n\n${md}`);

      - name: Post benchmark comment
        if: hashFiles('.bench/comment.md') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          COMMENT_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | startswith("<!-- bench-results -->")) | .id' | head -1)
          if [[ -n "$COMMENT_ID" ]]; then
            gh api "repos/$REPO/issues/comments/$COMMENT_ID" -X PATCH --field body=@.bench/comment.md
          else
            gh pr comment "$PR_NUMBER" --body-file .bench/comment.md
          fi
