name: CI Pipeline
permissions:
  contents: read

on:
  workflow_call:
    outputs:
      artifact-id:
        description: "Benchmark artifact ID"
        value: ${{ jobs.validate.outputs.artifact-id }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.artifact-upload-step.outputs.artifact-id }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup pnpm from packageManager
        uses: pnpm/action-setup@v6
        with:
          package_json_file: package.json

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "pnpm"
  
      - name: Install Dependencies
        run: pnpm i --frozen-lockfile
       
      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test:unit:ci

      - name: Benchmark
        run: mkdir -p .bench && pnpm bench

      - name: Upload benchmark results
        id: artifact-upload-step
        uses: actions/upload-artifact@v7
        with:
          name: bench-pr
          path: .bench/results.json
          overwrite: true
