name: CI Pipeline
permissions:
  contents: read

on:
  workflow_call:
    inputs:
      with-baseline:
        required: false
        type: boolean
        default: false
    outputs:
      bench-artifact-id:
        description: "Benchmark results artifact ID"
        value: ${{ jobs.validate.outputs.bench-artifact-id }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      bench-artifact-id: ${{ steps.upload-bench.outputs.artifact-id }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup pnpm from packageManager
        uses: pnpm/action-setup@v6
        with:
          package_json_file: package.json

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "pnpm"
  
      - name: Install Dependencies
        run: pnpm i --frozen-lockfile
       
      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test:unit:ci

      - name: Download baseline
        if: inputs.with-baseline
        uses: actions/download-artifact@v7
        with:
          name: bench-baseline
          path: .bench

      - name: Benchmark
        run: mkdir -p .bench && pnpm bench

      - name: Upload benchmark results
        id: upload-bench
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: |
            .bench/results.json
            .bench/baseline.json
          overwrite: true
